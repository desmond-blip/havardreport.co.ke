<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Havard Academy - Report System</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f4f8ff;
    }

    /* Header */
    .header {
        background: #0a3d91;
        color: white;
        padding: 20px;
        text-align: center;
    }

    .header h1 {
        margin: 0;
        font-size: 32px;
        letter-spacing: 1px;
    }

    .header p {
        margin: 5px 0 0;
        font-size: 16px;
    }

    /* Main Section */
    .container {
        text-align: center;
        padding: 80px 20px;
    }

    .container h2 {
        color: #0a3d91;
        margin-bottom: 20px;
        font-size: 28px;
    }

    .container p {
        color: #333;
        font-size: 18px;
        margin-bottom: 40px;
    }

    /* Button */
    .btn {
        background-color: #0a3d91;
        color: white;
        padding: 15px 35px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s ease;
        text-decoration: none;
    }

    .btn:hover {
        background-color: #062c66;
    }

    /* Footer */
    .footer {
        background: #0a3d91;
        color: white;
        text-align: center;
        padding: 15px;
        position: fixed;
        width: 100%;
        bottom: 0;
        font-size: 14px;
    }
</style>
</head>

<body>

    <!-- Header -->
    <!-- Header -->
<!-- Header -->
<div class="header">
    <img src="havard.png" alt="Havard Academy Logo" style="width:150px; display:block; margin: 0 auto 10px;">
    <h1>HAVARD ACADEMY</h1>
    <p>Pupil Report Generating System</p>
</div>



    <!-- Main Content -->
    <div class="container">
        <h2>Welcome to the Report Management Portal</h2>
        <p>Generate, manage, and print pupils' academic reports easily.</p>

        <a href="report.html">
            <button class="btn">Generate Pupil Report</button>
        </a>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2026 Havard Academy | All Rights Reserved
    </div>

</body>
</html>
